<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ร้านอาหารบ้านตั้ม&ตุ๋ย</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap');

        body, html { height: 100%; margin: 0; font-family: 'Kanit', sans-serif; background-color: #000; }

        /* 📸 พื้นหลังรูป 2547 */
        .hero-image {
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                              url('IMG_2547.jpeg'); 
            height: 100vh;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .hero-text {
            background: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 30px;
            border: 2px solid #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            width: 85%;
            max-width: 500px;
        }

        .hero-text h1 { 
            font-size: 28px; 
            margin-bottom: 20px; 
            color: #ffd700; 
            white-space: nowrap; /* ชื่อร้านบรรทัดเดียว */
        }

        /* 📍 สไตล์ปุ่มกด */
        .btn-grid { display: flex; flex-direction: column; gap: 12px; }

        .btn {
            padding: 15px;
            text-decoration: none;
            font-size: 17px;
            font-weight: bold;
            border-radius: 15px;
            transition: 0.3s;
            display: block;
            border: none;
            cursor: pointer;
            white-space: nowrap; /* ล็อกให้ข้อความในปุ่มไม่ขึ้นบรรทัดใหม่ */
        }

        /* ปุ่มที่ 1: เมนูอาหาร (สีส้มสดใส) */
        .btn-1 { background-color: #e67e22; color: white; }

        /* ปุ่มที่ 2: Facebook */
        .btn-2 { background-color: #1877F2; color: white; }

        /* ปุ่มที่ 3: โทรศัพท์ */
        .btn-3 { background-color: #2ecc71; color: white; }

        /* ปุ่มที่ 4: พิกัด */
        .btn-4 { background-color: #ffffff; color: #000; }

        .btn:hover { transform: scale(1.03); opacity: 0.9; }

        .contact-info { margin-top: 20px; font-size: 13px; color: #ccc; }
    </style>
</head>
<body>

    <div class="hero-image">
        <div class="hero-text">
            <h1>ร้านอาหารบ้านตั้ม&ตุ๋ย</h1>
            
            <div class="btn-grid">
                <a href="https://Tum-Tui.github.io/Tum-Tui2/" class="btn btn-1">📖 เมนูอาหาร</a>

                <a href="https://www.facebook.com/profile.php?id=100036159622485&locale=th_TH" target="_blank" class="btn btn-2">💬 ทักหาเพจร้าน</a>

                <a href="tel:0819736722" class="btn btn-3">📞 โทร: 081-973-6722</a>
                <a href="tel:0869393009" class="btn btn-3" style="margin-top: -5px;">📞 โทร: 086-939-3009</a>

                <a href="http://maps.google.com/?q=ร้านอาหารบ้านตั้มและตุ๋ย" target="_blank" class="btn btn-4">📍 พิกัดร้าน / สถานที่</a>
            </div>

            <div class="contact-info">
                ⏰ เปิดเวลา 11:00 น. ถึง 21:00 น.
            </div>
        </div>
    </div>

</body>
</html>
